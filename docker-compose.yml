version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: ["npm", "run", "dev"]
    working_dir: /app
    stdin_open: true
    tty: true

networks:
  app-network:
    driver: bridge

